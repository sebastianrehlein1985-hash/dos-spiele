<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LOTUS The Ultimate Challenge</title>
  <script src="https://js-dos.com/6.22/current/js-dos.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      text-align: center;
      margin: 0;
      padding: 20px;
    }

    h1 {
      margin-bottom: 20px;
    }

    button {
      font-size: 18px;
      padding: 12px 20px;
      margin: 10px;
      cursor: pointer;
      border: none;
      border-radius: 8px;
    }

    #spiel {
      width: 960px;
      height: 600px;
      margin: 20px auto;
      background: black;
    }
  </style>
</head>
<body>

  <h1>LOTUS The Ultimate Challenge</h1>

  <button onclick="ladeSpiel()">Spiel starten</button>
  <button onclick="fullscreen()">Vollbild</button>

  <div id="spiel"></div>

  <script>
    let dosInstance = null;

    function ladeSpiel() {
      const spielContainer = document.getElementById("spiel");
      spielContainer.innerHTML = "";

      dosInstance = Dos(spielContainer, {
        url: "LOTUSch.zip"
      });
    }

    function fullscreen() {
      const spielContainer = document.getElementById("spiel");

      if (spielContainer.requestFullscreen) {
        spielContainer.requestFullscreen();
      } else if (spielContainer.webkitRequestFullscreen) {
        spielContainer.webkitRequestFullscreen();
      } else if (spielContainer.msRequestFullscreen) {
        spielContainer.msRequestFullscreen();
      }
    }
  </script>

</body>
</html>
